<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 244px;
        margin: 0;
        padding: 14px 16px;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0a0a0a;
        color: #f5f5f5;
      }
      h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 10px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
        margin-bottom: 12px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #555;
      }
      .dot.ok {
        background: #6fcf86;
      }
      p {
        font-size: 11px;
        line-height: 1.55;
        color: #8c8c8c;
        margin: 0;
      }
      b {
        color: #c9c9c9;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <h1>Palma Clipper</h1>
    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="label">Checking…</span>
    </div>
    <p>Right-click any image and choose <b>Save image to Palma</b>. It lands in your <b>Inbox</b> project.</p>
    <script src="popup.js"></script>
  </body>
</html>
